version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: routes_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: routes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d routes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: routes_app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=secret123
      - DB_NAME=routes_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: